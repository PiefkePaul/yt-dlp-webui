name: Update Runtime Versions

on:
  schedule:
    - cron: "17 5 * * 1"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-runtime-versions:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Fetch latest runtime versions
        id: versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
              "X-GitHub-Api-Version": "2022-11-28",
          }
          urls = {
              "ytdlp": "https://api.github.com/repos/yt-dlp/yt-dlp/releases/latest",
              "deno": "https://api.github.com/repos/denoland/deno/releases/latest",
          }

          versions = {}
          for key, url in urls.items():
              request = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(request) as response:
                  payload = json.load(response)
              tag = payload["tag_name"]
              if key == "deno" and tag.startswith("v"):
                  tag = tag[1:]
              versions[key] = tag

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"ytdlp_version={versions['ytdlp']}\n")
              output.write(f"deno_version={versions['deno']}\n")
          PY

      - name: Update runtime versions in repository files
        id: update
        env:
          YTDLP_VERSION: ${{ steps.versions.outputs.ytdlp_version }}
          DENO_VERSION: ${{ steps.versions.outputs.deno_version }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re

          root = pathlib.Path(".")
          ytdlp = os.environ["YTDLP_VERSION"]
          deno = os.environ["DENO_VERSION"]

          dockerfile_path = root / "Dockerfile"
          dockerfile = dockerfile_path.read_text(encoding="utf-8")
          dockerfile = re.sub(r"^ARG YTDLP_VERSION=.*$", f"ARG YTDLP_VERSION={ytdlp}", dockerfile, flags=re.MULTILINE)
          dockerfile = re.sub(r"^ARG DENO_VERSION=.*$", f"ARG DENO_VERSION={deno}", dockerfile, flags=re.MULTILINE)
          dockerfile_path.write_text(dockerfile, encoding="utf-8")

          compose_path = root / "docker-compose.yml"
          compose = compose_path.read_text(encoding="utf-8")
          compose = re.sub(r"YTDLP_VERSION:\s*.*", f"YTDLP_VERSION: {ytdlp}", compose)
          compose = re.sub(r"DENO_VERSION:\s*.*", f"DENO_VERSION: {deno}", compose)
          compose_path.write_text(compose, encoding="utf-8")
          PY

          if git diff --quiet -- Dockerfile docker-compose.yml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Git identity
        if: steps.update.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit runtime version updates
        if: steps.update.outputs.changed == 'true'
        env:
          YTDLP_VERSION: ${{ steps.versions.outputs.ytdlp_version }}
          DENO_VERSION: ${{ steps.versions.outputs.deno_version }}
        run: |
          git add Dockerfile docker-compose.yml
          git commit -m "chore: update yt-dlp to ${YTDLP_VERSION} and deno to ${DENO_VERSION}"
          git push origin HEAD:${{ github.event.repository.default_branch }}
