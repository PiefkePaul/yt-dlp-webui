name: Deploy Demo Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      pages_enabled: ${{ steps.check.outputs.pages_enabled }}

    steps:
      - name: Check whether GitHub Pages is enabled
        id: check
        env:
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          status_code=$(curl -sS -o /tmp/pages.json -w '%{http_code}' \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/pages")

          if [ "$status_code" = "200" ]; then
            echo "pages_enabled=true" >> "$GITHUB_OUTPUT"
            echo "GitHub Pages ist fuer dieses Repository bereits aktiviert."
          else
            echo "pages_enabled=false" >> "$GITHUB_OUTPUT"
            echo "GitHub Pages ist fuer dieses Repository noch nicht aktiviert. Der Demo-Deploy wird deshalb uebersprungen." >> "$GITHUB_STEP_SUMMARY"
          fi

  build:
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.pages_enabled == 'true'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build static demo
        run: npm run pages:build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist-pages

  deploy:
    runs-on: ubuntu-latest
    needs:
      - preflight
      - build
    if: needs.preflight.outputs.pages_enabled == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
