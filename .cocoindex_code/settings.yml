exclude_patterns:
  - '**/.*'
  - '**/__pycache__'
  - '**/*.pyc'
  - '**/*.egg-info'
  - '**/.venv'
  - '**/venv'
  - '**/.mypy_cache'
  - '**/.ruff_cache'
  - '**/.cocoindex_code'
  - 'data/**'
  - '**/*.db'
  - '**/*.sqlite'
  - '**/*.log'
  - '**/node_modules'
  - '**/dist'
  - '**/build'

include_patterns:
  - '**/*.md'
  - '**/*.txt'
  - '**/*.yaml'
  - '**/*.yml'
  - '**/*.toml'
  - '**/*.json'
  - '**/Dockerfile*'
  - '**/.env.example'
  - '**/.env.template'
  - '**/*.ts'
  - '**/*.tsx'
  - '**/*.js'
  - '**/*.jsx'
  - '**/*.astro'
  - '**/*.css'
  - '**/*.scss'
